<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ABC শিখি 🎉 - বাচ্চাদের অ্যালফাবেট অ্যাপ</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- Stars background -->
  <div class="stars" id="stars"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">🌟 ABC শিখি</div>
      <div class="score-box">
        <span>⭐ পয়েন্ট: <strong id="score">0</strong></span>
      </div>
    </div>
  </header>

  <!-- Nav Tabs -->
  <nav class="nav-tabs">
    <button class="tab-btn active" onclick="showTab('learn')">📖 শিখি</button>
    <button class="tab-btn" onclick="showTab('quiz')">🎯 কুইজ</button>
    <button class="tab-btn" onclick="showTab('song')">🎵 গান</button>
  </nav>

  <!-- LEARN TAB -->
  <section class="tab-content active" id="tab-learn">
    <h2 class="section-title">অ্যালফাবেট শিখি! 🦋</h2>
    <div class="alphabet-grid" id="alphabetGrid"></div>
  </section>

  <!-- QUIZ TAB -->
  <section class="tab-content" id="tab-quiz">
    <h2 class="section-title">কুইজ খেলি! 🎮</h2>
    <div class="quiz-box">
      <div class="quiz-question" id="quizQuestion">কোন অক্ষর দিয়ে শুরু?</div>
      <div class="quiz-emoji" id="quizEmoji">🍎</div>
      <div class="quiz-options" id="quizOptions"></div>
      <div class="quiz-result" id="quizResult"></div>
    </div>
  </section>

  <!-- SONG TAB -->
  <section class="tab-content" id="tab-song">
    <h2 class="section-title">ABC গান শুনি! 🎵</h2>
    <div class="song-box">
      <div class="song-display" id="songDisplay"></div>
      <div class="song-controls">
        <button class="song-btn" id="playSongBtn" onclick="toggleSong()">▶️ গান শুরু</button>
      </div>
      <div class="song-current" id="currentLetter"></div>
    </div>
  </section>

  <!-- Letter Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
    <div class="modal-card" id="modalCard" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-letter" id="modalLetter"></div>
      <div class="modal-letter-lower" id="modalLetterLower"></div>
      <div class="modal-emoji" id="modalEmoji"></div>
      <div class="modal-word" id="modalWord"></div>
      <div class="modal-pronunciation" id="modalPronunciation"></div>
      <button class="modal-speak-btn" id="modalSpeakBtn">🔊 শুনি</button>
      <div class="modal-nav">
        <button onclick="navigateLetter(-1)">◀ আগের</button>
        <button onclick="navigateLetter(1)">পরের ▶</button>
      </div>
    </div>
  </div>

  <!-- Confetti canvas -->
  <canvas id="confettiCanvas"></canvas>

  <script src="app.js"></script>
</body>
</html>
