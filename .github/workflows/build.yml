name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install buildozer cython
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk \
          python3-pip autoconf libtool \
          pkg-config zlib1g-dev libncurses5-dev \
          libncursesw5-dev libtinfo5 cmake

    - name: Create main.py
      run: |
        cat > main.py << 'EOF'
        from kivy.app import App
        from kivy.uix.webview import WebView
        
        class FunlearnApp(App):
            def build(self):
                return WebView(
                    url='https://mohiuddinramzan2.github.io/Funlearn'
                )
        
        if __name__ == '__main__':
            FunlearnApp().run()
        EOF

    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
        [app]
        title = Funlearn
        package.name = funlearn
        package.domain = org.funlearn
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas
        version = 1.0
        requirements = python3,kivy
        android.permissions = INTERNET
        android.api = 33
        android.minapi = 21
        android.archs = arm64-v8a
        [buildozer]
        log_level = 2
        EOF

    - name: Build APK
      run: |
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Funlearn-APK
        path: bin/*.apk
